spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/auth/**

            - id: user-service-me
              uri: http://localhost:8081
              predicates:
                - Path=/api/me/**

            - id: user-service-users
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**

jwt:
  secret: test-secret-key-minimum-32-chars-for-hmac-sha256-algorithm

logging:
  level:
    root: INFO
    my.code.gateway: DEBUG